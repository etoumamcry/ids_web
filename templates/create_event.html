{% extends 'base.html' %}
{% block content %}
<div class="pg-head a1">
  <div><div class="pg-title">Créer un Événement</div><div class="pg-sub">Analysé immédiatement contre les règles actives</div></div>
  <a href="/" class="btn btn-outline btn-sm"><i class="fas fa-arrow-left"></i> Retour</a>
</div>
<div class="a2" style="max-width:600px">
  <div class="card">
    <div class="card-header"><h6>Paramètres de l'événement</h6></div>
    <div class="card-body">
      <form method="POST">
        <div class="g-stats g-2">
          <div class="f-group"><label class="f-label">Source IP</label><input type="text" name="source_ip" class="f-input" value="10.0.0.45" required></div>
          <div class="f-group"><label class="f-label">Destination IP</label><input type="text" name="dest_ip" class="f-input" value="192.168.1.100"></div>
          <div class="f-group"><label class="f-label">Port</label><input type="number" name="port" class="f-input" value="445" required></div>
          <div class="f-group">
            <label class="f-label">Protocole</label>
            <select name="protocol" class="f-select"><option value="TCP">TCP</option><option value="UDP">UDP</option><option value="ICMP">ICMP</option></select>
          </div>
          <div class="f-group">
            <label class="f-label">Type d'événement</label>
            <select name="event_type" class="f-select"><option value="Manuel">Manuel</option><option value="Test">Test</option></select>
          </div>
        </div>
        <div class="f-group"><label class="f-label">Payload / Données</label><textarea name="payload" class="f-input f-textarea" rows="3" placeholder="ex: SELECT * FROM users WHERE 1=1"></textarea></div>
        <button type="submit" class="btn btn-primary btn-full mt-2"><i class="fas fa-magnifying-glass"></i> Créer et Analyser</button>
      </form>
    </div>
  </div>
</div>
{% endblock %}
