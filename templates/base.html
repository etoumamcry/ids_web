<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🛡️ IDS - Intrusion Detection System</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg: #0a0f1c;
            --card: #121a2e;
            --accent: #6366f1;
        }
        body {
            background: var(--bg);
            color: #cbd5e1;
            font-family: 'Inter', sans-serif;
            font-size: 0.95rem;
        }
        .navbar { 
            background: linear-gradient(135deg, #1e2937, #0f172a); 
            border-bottom: 1px solid #334155;
        }
        .card {
            background: var(--card);
            border: 1px solid #334155;
            border-radius: 16px;
        }
        h1, h2, h3, h5 { font-weight: 600; }
        .table th { font-size: 0.85rem; text-transform: uppercase; letter-spacing: 0.5px; color: #94a3b8; }
        .small { font-size: 0.85rem; }
    </style>
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark">
        <div class="container">
            <a class="navbar-brand fw-bold" href="/">🛡️ IDS Web</a>
            <div class="navbar-nav ms-auto d-flex gap-3">
                <a class="nav-link" href="/"><i class="fas fa-chart-line"></i> Dashboard</a>
                <a class="nav-link" href="/events"><i class="fas fa-list-ul"></i> Événements</a>
                <a class="nav-link" href="/rules"><i class="fas fa-shield-halved"></i> Politiques</a>
                <a class="nav-link" href="/alerts"><i class="fas fa-bell"></i> Alertes</a>
                <a class="nav-link btn btn-sm btn-primary" href="/create_event">+ Événement</a>
                <a class="nav-link btn btn-sm btn-outline-info" href="/simulate">Simuler</a>
            </div>
        </div>
    </nav>

    <div class="container mt-4">
        {% with messages = get_flashed_messages(with_categories=true) %}
          {% if messages %}
            {% for category, message in messages %}
              <div class="alert alert-{{ 'success' if category in ['success','info'] else 'danger' }} alert-dismissible fade show">
                {{ message }}
                <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
              </div>
            {% endfor %}
          {% endif %}
        {% endwith %}

        {% block content %}{% endblock %}
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
