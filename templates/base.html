<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🛡️ IDS - Intrusion Detection System</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg: #0a0f1c;
            --card: #111827;
            --accent: #6366f1;
        }
        body {
            background: var(--bg);
            color: #e0e7ff;
            font-family: 'Inter', sans-serif;
        }
        .navbar {
            background: linear-gradient(135deg, #1e2937, #0f172a);
            border-bottom: 1px solid #334155;
        }
        .card {
            background: var(--card);
            border: 1px solid #334155;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
        }
        h1 { font-size: 1.85rem; font-weight: 700; }
        .nav-link { color: #cbd5e1 !important; }
        .nav-link:hover { color: white !important; }
        .badge { border-radius: 50px; }
    </style>
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark sticky-top">
        <div class="container">
            <a class="navbar-brand fw-bold fs-4" href="/">
                🛡️ IDS <span class="text-indigo">Web</span>
            </a>
            <div class="navbar-nav ms-auto d-flex gap-3 align-items-center">
                <a class="nav-link" href="/"><i class="fas fa-chart-line"></i> Dashboard</a>
                <a class="nav-link" href="/events"><i class="fas fa-list"></i> Événements</a>
                <a class="nav-link" href="/rules"><i class="fas fa-shield-halved"></i> Politiques</a>
                <a class="nav-link" href="/alerts"><i class="fas fa-bell"></i> Alertes</a>
                
                <a href="/create_event" class="btn btn-primary btn-sm">
                    <i class="fas fa-plus"></i> Événement
                </a>
                <a href="/simulate" class="btn btn-outline-info btn-sm">
                    <i class="fas fa-bolt"></i> Simuler
                </a>
            </div>
        </div>
    </nav>

    <div class="container mt-4 pb-5">
        {% with messages = get_flashed_messages(with_categories=true) %}
          {% if messages %}
            {% for category, message in messages %}
              <div class="alert alert-{{ 'success' if category in ['success','info'] else 'danger' }} alert-dismissible fade show shadow-sm">
                {{ message }}
                <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
              </div>
            {% endfor %}
          {% endif %}
        {% endwith %}

        {% block content %}{% endblock %}
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
