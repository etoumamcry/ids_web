{% extends 'base.html' %}
{% block content %}
<div class="pg-head a1">
  <div>
    <div class="pg-title">Changer le mot de passe</div>
    <div class="pg-sub">Compte : <strong>{{ user.username }}</strong> ({{ user.role }})</div>
  </div>
</div>

<div class="card a2" style="max-width:480px">
  <div class="card-body">
    <form method="POST" action="/account/password">
      <input type="hidden" name="_csrf_token" value="{{ csrf_token() }}">

      <div class="f-group">
        <label class="f-label">Mot de passe actuel</label>
        <input type="password" name="current_password" class="f-input" required autocomplete="current-password">
      </div>

      <div class="f-group">
        <label class="f-label">Nouveau mot de passe (8+ caractères)</label>
        <input type="password" name="new_password" class="f-input" required minlength="8" autocomplete="new-password">
      </div>

      <div class="f-group">
        <label class="f-label">Confirmer le nouveau mot de passe</label>
        <input type="password" name="confirm_password" class="f-input" required minlength="8" autocomplete="new-password">
      </div>

      <button type="submit" class="btn btn-primary btn-full mt-2">
        <i class="fas fa-key"></i> Changer le mot de passe
      </button>
    </form>
  </div>
</div>
{% endblock %}
