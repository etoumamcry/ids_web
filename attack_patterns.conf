# ══════════════════════════════════════════════════════════════════════════════
# IDS Web — Patterns d'attaque (détection comportementale)
#
# Format : name;resource;task;threshold;window_sec;severity;description
#
# Champs :
#   name        : identifiant unique du pattern (utilisé dans l'alerte)
#   resource    : ressource ciblée (ssh_server, web_server, file_system, …)
#                 ou '*' pour toutes les ressources
#   task        : action surveillée (failed_login, execute, read, write, connect)
#                 ou '*' pour toutes les tâches
#   threshold   : nombre d'événements pour déclencher l'alerte
#   window_sec  : fenêtre temporelle (en secondes)
#   severity    : critical | high | medium | low
#   description : message affiché dans l'alerte
#
# La détection se fait par (resource, task, username). Quand un utilisateur
# dépasse le seuil, UNE SEULE alerte nommée est générée (puis cooldown).
#
# Modifier ce fichier et recharger (toutes les 30s automatiquement).
# ══════════════════════════════════════════════════════════════════════════════

# ── BRUTE FORCE (différents services) ────────────────────────────────────────
BRUTE_FORCE_SSH;ssh_server;failed_login;5;5;critical;Brute force SSH — 5 tentatives en 5s
BRUTE_FORCE_WEB;web_login;failed_login;5;30;high;Brute force login web — 5 tentatives en 30s
BRUTE_FORCE_DB;database;failed_login;3;10;critical;Brute force base de données — 3 tentatives en 10s
BRUTE_FORCE_FTP;ftp_server;failed_login;5;15;high;Brute force FTP — 5 tentatives en 15s
BRUTE_FORCE_RDP;rdp_server;failed_login;5;10;critical;Brute force RDP — 5 tentatives en 10s

# ── EXFILTRATION / ABUS D'ACCÈS ──────────────────────────────────────────────
FILE_READ_FLOOD;file_system;read;50;30;high;Lecture massive de fichiers (exfiltration ?) — 50 en 30s
FILE_WRITE_FLOOD;file_system;write;30;30;high;Écriture massive — 30 en 30s
FILE_DELETE_FLOOD;file_system;delete;10;30;critical;Suppression massive (ransomware ?) — 10 en 30s

# ── EXÉCUTION SUSPECTE ────────────────────────────────────────────────────────
EXEC_FLOOD;*;execute;20;60;high;Exécution massive de commandes — 20 en 60s
PRIVESC_ATTEMPT;system;execute;5;10;critical;Tentative escalade privilèges — 5 execs root en 10s

# ── ÉNUMÉRATION / RECONNAISSANCE ─────────────────────────────────────────────
USER_ENUM;user_management;read;10;30;medium;Énumération d'utilisateurs — 10 lectures en 30s
PORT_PROBE;*;connect;15;5;high;Scan rapide de ports — 15 connexions en 5s

# ── ATTAQUES WEB ─────────────────────────────────────────────────────────────
SQL_INJECT_REPEAT;web_server;sql_inject;3;60;critical;Tentatives répétées injection SQL
XSS_REPEAT;web_server;xss;3;60;high;Tentatives répétées XSS
PATH_TRAVERSAL_REPEAT;web_server;path_traversal;3;60;critical;Path traversal répété
