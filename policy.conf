# ============================================================
# IDS — Politique de Sécurité
# Format : username;resource;task;start_date;end_date;active
#
# Dates  : YYYY-MM-DD          (autorisation sur la journée entière)
#          YYYY-MM-DD HH:MM    (restriction horaire précise)
#
# Active : 1=oui, 0=non
#
# Tâches : read, write, delete, execute, admin, login,
#          failed_login, backup, restore, connect, port_scan
#
# Ressources auto-détectées :
#   ssh_server, database, web_server, email_server,
#   file_storage, system, user_management, firewall,
#   network_scanner, rdp_server, ftp_server
# ============================================================

# ── Alice (admin) — accès complet base de données + SSH ──────────────────────
alice;database;read;2026-01-01;2026-12-31;1
alice;database;write;2026-01-01;2026-12-31;1
alice;database;admin;2026-01-01;2026-12-31;1
alice;ssh_server;login;2026-01-01;2026-12-31;1
alice;system;execute;2026-01-01;2026-12-31;1

# ── Bob (analyste) — accès DB limité dans le temps + web ─────────────────────
bob;database;read;2026-01-01;2026-06-30;1
bob;web_server;read;2026-01-01;2026-12-31;1
bob;web_server;write;2026-01-01;2026-12-31;1
bob;ssh_server;login;2026-01-01;2026-12-31;1

# ── Charlie (utilisateur) — stockage fichiers avec restriction horaire ────────
# Accès write uniquement entre 08h et 18h (jours ouvrés simulés)
charlie;file_storage;read;2026-01-01;2026-12-31;1
charlie;file_storage;write;2026-03-01 08:00;2026-09-30 18:00;1
charlie;ssh_server;login;2026-01-01;2026-12-31;1

# ── Diana (utilisateur) — lecture seule web ──────────────────────────────────
diana;web_server;read;2026-01-01;2026-12-31;1
diana;ssh_server;login;2026-01-01;2026-12-31;1
